name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.23.0
        ports: ["7474:7474","7687:7687"]
        env:
          NEO4J_AUTH: neo4j/password123
          NEO4J_dbms_memory_heap_initial__size: 512m
          NEO4J_dbms_memory_heap_max__size: 1024m
          NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
        options: >-
          --health-cmd "curl --silent --fail http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v5
      
      # You need this to use 'bun test'
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Start app server
        run: |
          npm run dev &
          # Fixed the loop: 'sleep 1' should happen BEFORE the 'break' logic
          for i in {1..20}; do
            curl --silent --fail http://localhost:3000/ && break || sleep 2
          done
        env:
          # Your app needs these to start up!
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PRIVATE_KEY: ${{ secrets.SUPABASE_PRIVATE_KEY }}
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password123

      - name: Run unit tests
        run: bun test

      - name: Run smoke cycle
        run: npm run smoke:cycle
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PRIVATE_KEY: ${{ secrets.SUPABASE_PRIVATE_KEY }}
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password123
          BASE_URL: http://localhost:3000
          TEST_RUN: smoke-ci-${{ github.run_id }}