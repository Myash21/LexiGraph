name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.23.0
        ports: ["7474:7474","7687:7687"]
        env: NEO4J_AUTH = neo4j/password123
        options: >-
          --health-cmd "curl -f http://localhost:7474/db/data/ || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Start app server
        run: |
          npm run dev &
          for i in {1..20}; do
            curl --silent --fail http://localhost:3000/ || sleep 1 && break
          done
      - name: Run unit tests
        run: bun test
      - name: Run smoke cycle (ingest/query/cleanup)
        run: npm run smoke:cycle
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PRIVATE_KEY: ${{ secrets.SUPABASE_PRIVATE_KEY }}
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password123
          BASE_URL: http://localhost:3000
          TEST_RUN: smoke-ci-${{ github.run_id }}