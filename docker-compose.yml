# docker-compose.yml
# NOTE: Local development only.
# Production uses Neo4j Aura DB (see NEO4J_URI in .env)

version: '3.8'

services:
  neo4j:
    image: neo4j:5.23.0
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ./data/neo4j:/data